<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Slop Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4">🛡️ AI Slop Detector</h1>
            <p class="lead">Distinguish human soul from robotic slop.</p>
        </header>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <div class="mb-3">
                        <label class="form-label">Analyze Text or URL</label>
                        <textarea id="inputText" class="form-control" rows="8" placeholder="Paste article or URL here..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button onclick="runAnalysis(false)" class="btn btn-primary w-100">Analyze Text</button>
                        <button onclick="runAnalysis(true)" class="btn btn-outline-primary w-100">Analyze URL</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div id="resultsCard" class="card shadow-sm p-4 d-none">
                    <h3>Analysis Results</h3>
                    <div class="my-3">
                        <label>AI Confidence</label>
                        <div class="progress h-25">
                            <div id="aiBar" class="progress-bar bg-danger" role="progressbar"></div>
                        </div>
                    </div>
                    <div id="slopMetric" class="alert alert-warning mt-2"></div>
                    <div id="explanation" class="small text-muted mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
